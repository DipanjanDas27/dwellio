version: "3.9"

services:
  postgres:
    image: postgres:18
    container_name: house_rent_pg
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:latest
    container_name: house_rent_redis
    restart: always
    networks:
      - app_network

  backend:
    build:
      context: ./backend
    container_name: house_rent_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network:
    driver: bridge