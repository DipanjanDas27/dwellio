services:
  postgres:
    image: postgres:18
    container_name: house_rent_pg
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dipanjan -d house_rent" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: house_rent_redis
    restart: always
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: house_rent_backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: house_rent_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dwellio.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

volumes:
  pgdata:


networks:
  app_network:
    driver: bridge
